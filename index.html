<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Estiloso - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-wallet text-green"></i>
                <h2>Financo</h2>
            </div>
            <nav class="menu">
                <a href="#" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="#"><i class="fa-solid fa-arrow-trend-up"></i> Entradas</a>
                <a href="#"><i class="fa-solid fa-arrow-trend-down"></i> Despesas</a>
                <a href="#"><i class="fa-solid fa-gear"></i> Configurações</a>
            </nav>
            <div class="user-profile">
                <div class="avatar">arthur</div>
                <span>arthurscs2013</span>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1>Visão Geral</h1>
                <p>Dinheiro sob controle absoluto.</p>
            </header>

            <section class="cards-grid">
                <div class="card">
                    <div class="card-info">
                        <h3>Rendimentos</h3>
                        <p class="value">R$ 2.500,00</p>
                    </div>
                    <i class="fa-solid fa-circle-arrow-up icon-up"></i>
                </div>

                <div class="card">
                    <div class="card-info">
                        <h3>Despesas</h3>
                        <p class="value">R$ 1.000,00</p>
                    </div>
                    <i class="fa-solid fa-circle-arrow-down icon-down"></i>
                </div>

                <div class="card total">
                    <div class="card-info">
                        <h3>Saldo Total</h3>
                        <p class="value">R$ 1.500,00</p>
                    </div>
                    <i class="fa-solid fa-scale-balanced icon-total"></i>
                </div>
            </section>

            <section class="chart-section">
                <h3>Fluxo de Caixa recente</h3>
                <div class="mock-chart">
                    <div class="bar" style="height: 40%"><span>Jan</span></div>
                    <div class="bar" style="height: 60%"><span>Fev</span></div>
                    <div class="bar" style="height: 85%"><span>Mar</span></div>
                    <div class="bar" style="height: 50%"><span>Abr</span></div>
                    <div class="bar" style="height: 95%"><span>Mai</span></div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
